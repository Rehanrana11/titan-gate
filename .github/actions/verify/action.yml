name: Titan Gate Verify
description: Verify a Titan Gate cryptographic receipt using TRS-1 v1.0.0

inputs:
  receipt:
    description: Path to receipt JSON file
    required: true
  key:
    description: Hex-encoded HMAC signing key
    required: true
  format:
    description: Output format (text or json)
    required: false
    default: text

outputs:
  result:
    description: VALID or INVALID
    value: ${{ steps.verify.outputs.result }}
  ok:
    description: true if verification passed
    value: ${{ steps.verify.outputs.ok }}

runs:
  using: composite
  steps:
    - name: Install titan-gate
      shell: bash
      run: pip install titan-gate==1.0.1
    - name: Verify receipt
      id: verify
      shell: bash
      run: |
        OUTPUT=$(titan-verify ${{ inputs.receipt }} --key ${{ inputs.key }} --format json)
        echo "result=$(echo $OUTPUT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result','INVALID'))")" >> $GITHUB_OUTPUT
        echo "ok=$(echo $OUTPUT | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('ok',False)).lower())")" >> $GITHUB_OUTPUT
        echo $OUTPUT
        if [ "$(echo $OUTPUT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',False))")" != "True" ]; then
          echo "Receipt verification FAILED"
          exit 1
        fi
        echo "Receipt verification PASSED"
